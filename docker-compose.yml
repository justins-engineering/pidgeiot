services:
  postgresd:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=kratos
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=kratos
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - intranet

  kratos-migrate:
    depends_on:
      - postgresd
    image: oryd/kratos:v25.4
    environment:
      - DSN=postgres://kratos:secret@postgresd:5432/kratos?sslmode=disable&max_conns=20&max_idle_conns=4
    volumes:
      - type: bind
        source: ./schemas/kratos
        target: /opt/kratos
    command: -c /opt/kratos/kratos.yml migrate sql -e --yes
    restart: on-failure
    networks:
      - intranet

  kratos:
    depends_on:
      - kratos-migrate
    image: oryd/kratos:v25.4
    ports:
      - '4433:4433' # public
      - '4434:4434' # admin
    restart: unless-stopped
    environment:
      - DSN=postgres://kratos:secret@postgresd:5432/kratos?sslmode=disable&max_conns=20&max_idle_conns=4
      - LOG_LEVEL=info
    command: serve -c /opt/kratos/kratos.yml --dev --watch-courier --sqa-opt-out
    volumes:
      - type: bind
        source: ./schemas/kratos
        target: /opt/kratos/
    networks:
      - intranet

  kratos-admin-ui:
    depends_on:
      - kratos
    image: dhiagharsallaoui/kratos-admin-ui:latest
    ports:
      - '3000:3000'
    environment:
      - KRATOS_PUBLIC_URL=http://kratos:4433
      - KRATOS_ADMIN_URL=http://kratos:4434
    networks:
      - intranet

  mailslurper:
    image: oryd/mailslurper:latest-smtps
    ports:
      - '4436:4436'
      - '4437:4437'
    networks:
      - intranet

  # Pinned (task #26) — was `:latest`; dev and prod should run the exact
  # same version once prod is stood up (see dovecote's CLAUDE.md/wrangler.toml
  # notes on GREPTIMEDB_ENDPOINT), and an unpinned tag here would let the two
  # drift silently. `v1.1.2` is what `:latest` actually resolved to at the
  # time of pinning.
  greptimedb:
    image: greptime/greptimedb:v1.1.2
    ports:
      - '4000:4000' # HTTP (line-protocol write + SQL-over-HTTP read, both used by dovecote)
      - '4001:4001' # gRPC
      - '4002:4002' # MySQL wire
      - '4003:4003' # Postgres wire
    command: standalone start --http-addr 0.0.0.0:4000 --rpc-bind-addr 0.0.0.0:4001 --mysql-addr 0.0.0.0:4002 --postgres-addr 0.0.0.0:4003
    volumes:
      # Named volume (task #26) — was unmounted, so all telemetry data was
      # lost on every `docker-compose down`. `/greptimedb_data` is
      # GreptimeDB's own default data-home inside the image.
      - greptimedb_data:/greptimedb_data
    networks:
      - intranet

networks:
  intranet:

volumes:
  greptimedb_data:
