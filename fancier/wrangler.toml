name = "fancier"
compatibility_date = "2026-07-15"
send_metrics = false
# Keep version-preview URLs enabled on prod deploys — staging for this
# script IS a version preview (`versions upload -c wrangler.staging.toml
# --preview-alias staging`, see that file). Without this, a plain
# `wrangler deploy` resets the script's previews_enabled to false and the
# staging alias dies with error 1042 (happened 2026-07-17; re-enabled
# account-side by hand). workers_dev stays off: pidgeiot.com only.
preview_urls = true
workers_dev = false

[observability]
enabled = false

[[routes]]
pattern = "pidgeiot.com"
custom_domain = true
zone_name = "pidgeiot.com"

[assets]
directory = "../target/dx/fancier/release/web/public"
not_found_handling = "single-page-application"

[build]
command = "bunx @tailwindcss/cli -i ./assets/tailwind.css -o ./assets/styling/main.css -m && dx build --web --release --debug-symbols=false"
watch_dir = ["./src"]
