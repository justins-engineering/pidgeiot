[application]
name = "fancier"
asset_dir = "public"

[bundle]
copyright = "Justin's Engineering Services, LLC"
identifier = "com.justinsengineering"
publisher = "Justin's Engineering Services, LLC"
icon = [
  "assets/images/icon-dark.ico",
  "assets/images/icon-dark.svg",
  "assets/images/icon-light.ico",
  "assets/images/icon-light.svg",
]

[web]
pre_compress = false

[web.resource]
style = ["assets/styling/main.css"]
script = ["assets/theme-init.js"]

# style is left empty deliberately: dev keeps the old runtime
# document::Link (App(), src/lib.rs) instead of this static-link
# workaround, since `bunx @tailwindcss/cli --watch` (CLAUDE.md dev
# workflow) overwrites assets/styling/main.css live, and this feature's
# release-mode fix (see scripts/build-release.sh) relies on a copy
# that's frozen at build time — fine for a release artifact, wrong for
# live-reloading local dev. theme-init.js has no such conflict (it's a
# static, never-regenerated file — see its own header comment), so dev
# gets it too.
[web.resource.dev]
style = []
script = ["assets/theme-init.js"]

[web.app]
title = "PidgeIoT"

[web.watcher]
index_on_404 = true
