version: v25.4.0

dsn: postgres://kratos:secret@127.0.0.1:5432/kratos?sslmode=disable&max_conns=20&max_idle_conns=4

session:
  lifespan: 4h

serve:
  public:
    base_url: http://127.0.0.1:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://127.0.0.1:4433
        - http://127.0.0.1:4455
        - http://127.0.0.1
        - http://localhost
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
      exposed_headers:
        - Content-Type
        - Set-Cookie
      allow_credentials: true
  admin:
    base_url: http://127.0.0.1:4434/

selfservice:
  default_browser_return_url: http://127.0.0.1:4455/
  allowed_return_urls:
    - http://127.0.0.1
    - http://localhost:19006/Callback
    - exp://localhost:8081/--/Callback

  methods:
    password:
      enabled: true
    totp:
      config:
        issuer: Kratos
      enabled: true
    lookup_secret:
      enabled: true
    link:
      enabled: true
    code:
      enabled: true

  flows:
    error:
      ui_url: http://127.0.0.1:4455/error

    settings:
      ui_url: http://127.0.0.1:4455/settings
      privileged_session_max_age: 15m
      required_aal: highest_available

    recovery:
      enabled: true
      ui_url: http://127.0.0.1:4455/recovery
      use: code

    verification:
      enabled: true
      ui_url: http://127.0.0.1:4455/verification
      use: code
      after:
        default_browser_return_url: http://127.0.0.1:4455/session/local?state=true

    logout:
      after:
        default_browser_return_url: http://127.0.0.1:4455/session/local?state=false

    login:
      ui_url: http://127.0.0.1:4455/login
      lifespan: 10m
      after:
        default_browser_return_url: http://127.0.0.1:4455/session/local?state=true

    registration:
      lifespan: 10m
      ui_url: http://127.0.0.1:4455/registration
      # Uses Kratos v25.4's default TWO-STEP registration (profile traits
      # first, password on a second step). This works end-to-end in a real
      # browser: fancier's FormBuilder posts a native <form>, Kratos 303s back
      # to ui_url, the SPA re-fetches the merged flow and renders the password
      # step. NOTE: inspecting the flow with `Accept: application/json` shows
      # only profile nodes on step 1 (Kratos's JSON path returns 400 + the
      # next step's nodes) — that is NOT "registration is broken"; the native
      # browser form path (Accept: text/html) works. Do not re-add
      # enable_legacy_one_step on that false alarm. (See task #16.)
      after:
        default_browser_return_url: http://127.0.0.1:4455/session/local?state=true
        password:
          hooks:
            - hook: session
            - hook: show_verification_ui

log:
  level: debug
  format: text
  leak_sensitive_values: true

secrets:
  default:
    - 32-LONG-SECRET-NOT-SECURE-AT-ALL
  cookie:
    - 32-LONG-SECRET-NOT-SECURE-AT-ALL
  cipher:
    - 32-LONG-SECRET-NOT-SECURE-AT-ALL

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: argon2
  argon2:
    memory: 384MB
    iterations: 3
    parallelism: 16
    salt_length: 16
    key_length: 32
    expected_duration: 500ms
    expected_deviation: 500ms
    dedicated_memory: 1GB

identity:
  default_schema_id: user
  schemas:
    - id: user
      url: file:///opt/kratos/identity.user.schema.json

courier:
  smtp:
    connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true
  # Branded HTML/plaintext overrides for the verification/recovery email
  # flows (task #33), replacing Kratos's stock templates. Versioned as a
  # subdirectory (v1) rather than the bare courier-templates/ root so a
  # future redesign can land as v2/ and cut over by changing this one path,
  # without clobbering the previous version or requiring an in-place rewrite.
  # This path lives inside the same ./schemas/kratos bind mount
  # docker-compose.yml already uses for kratos.yml/identity.user.schema.json
  # (target /opt/kratos/ on the `kratos` service), so no separate volume
  # entry is needed for it to be visible in the container.
  template_override_path: /opt/kratos/courier-templates/v1
  # `template_override_path` above is Ory's documented mechanism and does work
  # for the subject line (confirmed live against a real recovery flow +
  # MailSlurper capture) -- but on this exact `oryd/kratos:v25.4` image, the
  # body (both HTML and plaintext) silently falls back to Kratos's *built-in*
  # stock body wording instead of reading the override file, even for a
  # trivial single-line replacement with no template directives at all. No
  # error is logged (the built-in template renders fine), so this is easy to
  # miss without literally rendering a real email end-to-end -- config
  # validation and even `wrangler`-style template parsing both look correct.
  # The explicit per-flow `templates:` keys below use a different, independent
  # code path (Kratos fetches the `file://` URI itself rather than resolving
  # it via template_override_path's directory-glob lookup) and were verified
  # live to render the real branded HTML correctly. Kept both: the explicit
  # keys win (a non-empty subject/body URL here always takes priority over
  # template_override_path), so this is belt-and-suspenders, not redundant
  # dead config -- if a future Kratos version fixes the underlying bug,
  # template_override_path alone would already be sufficient and these keys
  # simply stop mattering.
  templates:
    recovery:
      valid:
        email:
          subject: file:///opt/kratos/courier-templates/v1/recovery/valid/email.subject.gotmpl
          body:
            html: file:///opt/kratos/courier-templates/v1/recovery/valid/email.body.gotmpl
            plaintext: file:///opt/kratos/courier-templates/v1/recovery/valid/email.body.plaintext.gotmpl
      invalid:
        email:
          subject: file:///opt/kratos/courier-templates/v1/recovery/invalid/email.subject.gotmpl
          body:
            html: file:///opt/kratos/courier-templates/v1/recovery/invalid/email.body.gotmpl
            plaintext: file:///opt/kratos/courier-templates/v1/recovery/invalid/email.body.plaintext.gotmpl
    recovery_code:
      valid:
        email:
          subject: file:///opt/kratos/courier-templates/v1/recovery_code/valid/email.subject.gotmpl
          body:
            html: file:///opt/kratos/courier-templates/v1/recovery_code/valid/email.body.gotmpl
            plaintext: file:///opt/kratos/courier-templates/v1/recovery_code/valid/email.body.plaintext.gotmpl
      invalid:
        email:
          subject: file:///opt/kratos/courier-templates/v1/recovery_code/invalid/email.subject.gotmpl
          body:
            html: file:///opt/kratos/courier-templates/v1/recovery_code/invalid/email.body.gotmpl
            plaintext: file:///opt/kratos/courier-templates/v1/recovery_code/invalid/email.body.plaintext.gotmpl
    verification:
      valid:
        email:
          subject: file:///opt/kratos/courier-templates/v1/verification/valid/email.subject.gotmpl
          body:
            html: file:///opt/kratos/courier-templates/v1/verification/valid/email.body.gotmpl
            plaintext: file:///opt/kratos/courier-templates/v1/verification/valid/email.body.plaintext.gotmpl
      invalid:
        email:
          subject: file:///opt/kratos/courier-templates/v1/verification/invalid/email.subject.gotmpl
          body:
            html: file:///opt/kratos/courier-templates/v1/verification/invalid/email.body.gotmpl
            plaintext: file:///opt/kratos/courier-templates/v1/verification/invalid/email.body.plaintext.gotmpl
    verification_code:
      valid:
        email:
          subject: file:///opt/kratos/courier-templates/v1/verification_code/valid/email.subject.gotmpl
          body:
            html: file:///opt/kratos/courier-templates/v1/verification_code/valid/email.body.gotmpl
            plaintext: file:///opt/kratos/courier-templates/v1/verification_code/valid/email.body.plaintext.gotmpl
      invalid:
        email:
          subject: file:///opt/kratos/courier-templates/v1/verification_code/invalid/email.subject.gotmpl
          body:
            html: file:///opt/kratos/courier-templates/v1/verification_code/invalid/email.body.gotmpl
            plaintext: file:///opt/kratos/courier-templates/v1/verification_code/invalid/email.body.plaintext.gotmpl

feature_flags:
  use_continue_with_transitions: true

sqa-opt-out: true
