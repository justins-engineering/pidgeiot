name = "dovecote"
compatibility_date = "2026-07-15"
send_metrics = false
main = "build/worker/shim.mjs"

[[routes]]
pattern = "api.pidgeiot.com"
custom_domain = true
zone_name = "pidgeiot.com"

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 0

[vars]
KRATOS_BROWSER_URL = "https://auth.pidgeiot.com"
ROOT_URL = "https://pidgeiot.com"

[[hyperdrive]]
binding = "YugabyteDB"
id = "f2c59dfa75114889815fd453ac0db62a"

[durable_objects]
bindings = [{ name = "PIGEONS", class_name = "Pigeons" }]

# Firmware image storage (task #23) — signed MCUboot application binaries,
# ~300KB-1MB each, capped at capsules::MAX_FIRMWARE_BYTES (2MB) on upload.
# DO SQLite cannot hold blobs this size (see this crate's CLAUDE.md), so
# they live in R2 instead, content-addressed by sha256
# (`firmware/<sha256>.bin`); only catalog metadata (version, size, sha256,
# uploaded_at) lives in Postgres, per flock (see capsules::FirmwareImage).
# Each environment gets its own bucket, matching the telemetry queues'
# per-env pattern below.
[[r2_buckets]]
binding = "FIRMWARE_BUCKET"
bucket_name = "pidgeiot-firmware"

# Production telemetry queue (promotion authorized 2026-07-17). Same
# design as staging below: auth still happens synchronously at ingestion,
# the consumer only writes messages that already passed the DO bearer-token
# check. Each environment needs its own queue — Cloudflare allows exactly
# one consumer worker per queue, so prod (`dovecote`) owns
# `pidgeiot-telemetry` and staging (`dovecote-staging`) owns
# `pidgeiot-telemetry-staging`, matching the script naming convention.
[[queues.producers]]
queue = "pidgeiot-telemetry"
binding = "TELEMETRY_QUEUE"

[[queues.consumers]]
queue = "pidgeiot-telemetry"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Pigeons"]

[build]
command = "cargo install -q worker-build && worker-build --release"
watch_dir = ["./src"]

# Staging: a SEPARATE script named `dovecote-staging` (wrangler's default
# `<name>-<env>` naming — no `name` override, so this can never target the
# production `dovecote` script). Exists because version-preview URLs are not
# generated for Workers that implement a Durable Object
# (https://developers.cloudflare.com/workers/configuration/previews/), so the
# preview-alias staging model used by fancier is impossible here.
# `routes = []` overrides the inherited api.pidgeiot.com custom domain;
# staging is reachable only at dovecote-staging.<subdomain>.workers.dev.
# Note: fresh DO namespace (staging pigeons/tokens are disjoint from prod),
# but the Hyperdrive binding — and thus the Postgres mirror — is shared with
# production, so staging-created entities appear in the prod mirror tables.
[env.staging]
workers_dev = true
routes = []

[env.staging.vars]
KRATOS_BROWSER_URL = "https://auth.pidgeiot.com"
ROOT_URL = "https://staging-fancier.justinsengineeringservices.workers.dev"

[env.staging.durable_objects]
bindings = [{ name = "PIGEONS", class_name = "Pigeons" }]

[[env.staging.r2_buckets]]
binding = "FIRMWARE_BUCKET"
bucket_name = "pidgeiot-firmware-staging"

[[env.staging.hyperdrive]]
binding = "YugabyteDB"
id = "f2c59dfa75114889815fd453ac0db62a"

# Staging telemetry queue (task #14; see the production block above for
# the shared design rationale and why each environment has its own queue).
# Device auth still happens synchronously at ingestion
# (POST /device/pigeons/:id/telemetry verifies the bearer token against
# the DO before enqueueing anything — see
# verify_device_via_do/verify_telemetry_device); the consumer only ever
# writes messages that already passed that check. Environments without
# this binding (dev) fall back to the original synchronous
# direct-DO-write path — see the route in src/lib.rs.
[[env.staging.queues.producers]]
queue = "pidgeiot-telemetry-staging"
binding = "TELEMETRY_QUEUE"

[[env.staging.queues.consumers]]
queue = "pidgeiot-telemetry-staging"

[env.dev.vars]
KRATOS_BROWSER_URL = "http://127.0.0.1:4433"
ROOT_URL = "http://127.0.0.1:4455"

[env.dev.durable_objects]
# the `class_name` uses the Rust struct identifier name
bindings = [{ name = "PIGEONS", class_name = "Pigeons" }]

# `wrangler dev` (local mode, the default) emulates R2 buckets locally via
# Miniflare regardless of whether `bucket_name` matches a real remote
# bucket, so this doesn't need its own `wrangler r2 bucket create` — named
# distinctly from staging/production purely for clarity in logs.
[[env.dev.r2_buckets]]
binding = "FIRMWARE_BUCKET"
bucket_name = "pidgeiot-firmware-dev"

[[env.dev.hyperdrive]]
binding = "YugabyteDB"
id = ""
localConnectionString = "postgres://kratos:secret@127.0.0.1:5432/dovecote?sslmode=disable"

[[env.dev.routes]]
pattern = "127.0.0.1"
custom_domain = true
