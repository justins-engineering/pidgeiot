name = "dovecote"
compatibility_date = "2026-07-15"
send_metrics = false
main = "build/worker/shim.mjs"

[[routes]]
pattern = "api.pidgeiot.com"
custom_domain = true
zone_name = "pidgeiot.com"

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 0

# GREPTIMEDB_ENDPOINT (task #26, all three [vars]/[env.*.vars] blocks
# below) -- the platform's own default telemetry store, read via
# helpers/greptime.rs::greptime_origin. A bare origin (scheme+host+port),
# e.g. "http://127.0.0.1:4000" in dev, NOT a full path -- the read/write
# code appends its own "/v1/influxdb/write" / "/v1/sql" paths. Deliberately
# ABSENT here and in [env.staging.vars] -- prod/staging GreptimeDB is a
# self-hosted instance on Proxmox behind a Cloudflare Tunnel that doesn't
# exist yet (a user infra step, not a code dependency); until it's stood
# up and this var is set, every write/read call treats "unset" as "use the
# Postgres fallback" (see write_telemetry_default/the telemetry/history
# routes in lib.rs) -- no code change needed once the tunnel exists, just
# set this var (+ the secrets below) and deploy.
#
# GREPTIMEDB_DB (optional, per-env var) -- the GreptimeDB *database* the
# read/write paths target (helpers/greptime.rs::greptime_db). Unset → the
# built-in `public` database (what prod + dev use). Staging sets it to its
# own name so it can share prod's single self-hosted instance without its
# telemetry landing in prod's `public` db (task #26 design doc §1.4). ONE-
# TIME SETUP for any non-`public` name: GreptimeDB's InfluxDB write does not
# auto-create a missing database (it 400s "Failed to find schema"), so run
# `CREATE DATABASE <name>;` against the instance once (e.g. via its SQL HTTP
# endpoint) before pointing an env at it. Until then telemetry silently
# falls back to Postgres history rather than being lost.
#
# Companion Worker SECRETS (never here -- wrangler.toml is committed):
# GREPTIMEDB_AUTH_TOKEN (GreptimeDB's own HTTP auth, if the deployment has
# one -- local dev's docker GreptimeDB has none configured, so this stays
# unset in dev too) and GREPTIMEDB_ACCESS_CLIENT_ID/
# GREPTIMEDB_ACCESS_CLIENT_SECRET (the Cloudflare Access service-token
# pair this Worker presents so the Tunnel's Access policy lets it through
# -- only meaningful once staging/prod's tunnel exists; irrelevant in dev,
# which reaches the local docker instance directly with no Access gate).
# Set via `wrangler secret put <NAME> --env <env>` once the user's infra
# step lands.
[vars]
KRATOS_BROWSER_URL = "https://auth.pidgeiot.com"
ROOT_URL = "https://pidgeiot.com"
DEVICE_API_HOST = "api.pidgeiot.com"
# GREPTIMEDB_ENDPOINT intentionally unset -- see the comment block above.

[[hyperdrive]]
binding = "YugabyteDB"
id = "f2c59dfa75114889815fd453ac0db62a"

[durable_objects]
bindings = [{ name = "PIGEONS", class_name = "Pigeons" }]

# Firmware image storage (task #23) — signed MCUboot application binaries,
# ~300KB-1MB each, capped at capsules::MAX_FIRMWARE_BYTES (2MB) on upload.
# DO SQLite cannot hold blobs this size (see this crate's CLAUDE.md), so
# they live in R2 instead, content-addressed by sha256
# (`firmware/<sha256>.bin`); only catalog metadata (version, size, sha256,
# uploaded_at) lives in Postgres, per flock (see capsules::FirmwareImage).
# Each environment gets its own bucket, matching the telemetry queues'
# per-env pattern below.
[[r2_buckets]]
binding = "FIRMWARE_BUCKET"
bucket_name = "pidgeiot-firmware"

# Production telemetry queue (promotion authorized 2026-07-17). Same
# design as staging below: auth still happens synchronously at ingestion,
# the consumer only writes messages that already passed the DO bearer-token
# check. Each environment needs its own queue — Cloudflare allows exactly
# one consumer worker per queue, so prod (`dovecote`) owns
# `pidgeiot-telemetry` and staging (`dovecote-staging`) owns
# `pidgeiot-telemetry-staging`, matching the script naming convention.
[[queues.producers]]
queue = "pidgeiot-telemetry"
binding = "TELEMETRY_QUEUE"

[[queues.consumers]]
queue = "pidgeiot-telemetry"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Pigeons"]

[build]
command = "cargo install -q worker-build && worker-build --release"
watch_dir = ["./src"]

# Staging: a SEPARATE script named `dovecote-staging` (wrangler's default
# `<name>-<env>` naming — no `name` override, so this can never target the
# production `dovecote` script). Exists because version-preview URLs are not
# generated for Workers that implement a Durable Object
# (https://developers.cloudflare.com/workers/configuration/previews/), so the
# preview-alias staging model used by fancier is impossible here.
# `routes = []` overrides the inherited api.pidgeiot.com custom domain;
# staging is reachable only at dovecote-staging.<subdomain>.workers.dev.
# Note: fresh DO namespace (staging pigeons/tokens are disjoint from prod),
# but the Hyperdrive binding — and thus the Postgres mirror — is shared with
# production, so staging-created entities appear in the prod mirror tables.
[env.staging]
workers_dev = true
routes = []

[env.staging.vars]
KRATOS_BROWSER_URL = "https://auth.pidgeiot.com"
ROOT_URL = "https://staging-fancier.justinsengineeringservices.workers.dev"
DEVICE_API_HOST = "dovecote-staging.justinsengineeringservices.workers.dev"
# GREPTIMEDB_ENDPOINT intentionally unset -- see the top-of-file comment
# block above [vars]. TBD once the user's Proxmox+Tunnel infra step lands
# (something like "https://telemetry.pidgeiot.com"). When it does and staging
# shares prod's instance, keep this GREPTIMEDB_DB so staging telemetry stays
# in its own database (requires a one-time `CREATE DATABASE staging;` on the
# instance -- see the top-of-file GREPTIMEDB_DB note). Harmless while
# GREPTIMEDB_ENDPOINT is unset (the whole Greptime path is skipped).
GREPTIMEDB_DB = "staging"

[env.staging.durable_objects]
bindings = [{ name = "PIGEONS", class_name = "Pigeons" }]

[[env.staging.r2_buckets]]
binding = "FIRMWARE_BUCKET"
bucket_name = "pidgeiot-firmware-staging"

[[env.staging.hyperdrive]]
binding = "YugabyteDB"
id = "f2c59dfa75114889815fd453ac0db62a"

# Staging telemetry queue (task #14; see the production block above for
# the shared design rationale and why each environment has its own queue).
# Device auth still happens synchronously at ingestion
# (POST /device/pigeons/:id/telemetry verifies the bearer token against
# the DO before enqueueing anything — see
# verify_device_via_do/verify_telemetry_device); the consumer only ever
# writes messages that already passed that check. Environments without
# this binding (dev) fall back to the original synchronous
# direct-DO-write path — see the route in src/lib.rs.
[[env.staging.queues.producers]]
queue = "pidgeiot-telemetry-staging"
binding = "TELEMETRY_QUEUE"

[[env.staging.queues.consumers]]
queue = "pidgeiot-telemetry-staging"

[env.dev.vars]
KRATOS_BROWSER_URL = "http://127.0.0.1:4433"
ROOT_URL = "http://127.0.0.1:4455"
DEVICE_API_HOST = "127.0.0.1:8787"
# Local docker-compose GreptimeDB (task #26, docker-compose.yml's
# `greptimedb` service) -- reachable directly, no Cloudflare Tunnel/Access
# in dev, and no auth configured on the local instance either, so neither
# GREPTIMEDB_AUTH_TOKEN nor the GREPTIMEDB_ACCESS_CLIENT_* secrets are
# needed here.
GREPTIMEDB_ENDPOINT = "http://127.0.0.1:4000"

[env.dev.durable_objects]
# the `class_name` uses the Rust struct identifier name
bindings = [{ name = "PIGEONS", class_name = "Pigeons" }]

# `wrangler dev` (local mode, the default) emulates R2 buckets locally via
# Miniflare regardless of whether `bucket_name` matches a real remote
# bucket, so this doesn't need its own `wrangler r2 bucket create` — named
# distinctly from staging/production purely for clarity in logs.
[[env.dev.r2_buckets]]
binding = "FIRMWARE_BUCKET"
bucket_name = "pidgeiot-firmware-dev"

[[env.dev.hyperdrive]]
binding = "YugabyteDB"
id = ""
localConnectionString = "postgres://kratos:secret@127.0.0.1:5432/dovecote?sslmode=disable"

[[env.dev.routes]]
pattern = "127.0.0.1"
custom_domain = true
