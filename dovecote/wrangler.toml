name = "dovecot"
compatibility_date = "2026-05-15"
send_metrics = false
main = "build/worker/shim.mjs"

[[routes]]
pattern = "api.pidgeiot.net"
custom_domain = true
zone_name = "pidgeiot.net"

[build]
command = "cargo install -q worker-build && worker-build --release"
watch_dir = ["./src"]

[observability.logs]
enabled = true

[durable_objects]
# the `class_name` uses the Rust struct identifier name
bindings = [{ name = "PIGEONS", class_name = "Pigeons" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Pigeons"]

[[hyperdrive]]
binding = "YugabyteDB"
id = "f2c59dfa75114889815fd453ac0db62a"
localConnectionString = "postgres://kratos:secret@127.0.0.1:5432/dovecote?sslmode=disable"
